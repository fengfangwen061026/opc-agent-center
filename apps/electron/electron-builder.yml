appId: com.opc.agent-center
productName: OPC 超级中枢
copyright: OPC Agent Center
beforeBuild: scripts/before-build.cjs

directories:
  output: dist-app
  buildResources: resources

files:
  - dist/**/*

extraResources:
  - from: ../../apps/web/dist
    to: web
  - from: ../../apps/bridge/dist
    to: bridge
  - from: ../../apps/bridge/package.json
    to: bridge/package.json
  - from: ../../packages/core/dist
    to: bridge/node_modules/@opc/core/dist
  - from: ../../packages/core/package.json
    to: bridge/node_modules/@opc/core/package.json
  - from: ../../node_modules
    to: node_modules
  - from: ../../data/mock
    to: data/mock

mac:
  category: public.app-category.productivity
  icon: resources/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]

win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch: [x64]

linux:
  target:
    - target: AppImage
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
